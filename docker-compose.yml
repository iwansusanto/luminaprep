services:
  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: luminaprep-fe
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_URL=${API_URL}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - luminaprep-net

  redis:
    image: redis:7-alpine
    container_name: luminaprep-redis
    restart: always
    command: --maxmemory-policy noeviction
    networks:
      - luminaprep-net

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: luminaprep-backend:latest
    container_name: luminaprep-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - LANGFUSE_PUBLIC_KEY=pk-lf-032825a1-77a8-4ad5-9d37-5d5a760bb8df
      - LANGFUSE_SECRET_KEY=sk-lf-e24f6b4d-1e21-462c-a155-e54d083d3105
      - LANGFUSE_HOST=https://langprep.luminaprep.my.id
      - LANGFUSE_ENABLED=true
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - luminaprep-net
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads

  celery_worker:
    image: luminaprep-backend:latest
    container_name: luminaprep-celery-worker
    command: uv run celery -A app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      - LANGFUSE_PUBLIC_KEY=pk-lf-032825a1-77a8-4ad5-9d37-5d5a760bb8df
      - LANGFUSE_SECRET_KEY=sk-lf-e24f6b4d-1e21-462c-a155-e54d083d3105
      - LANGFUSE_HOST=https://langprep.luminaprep.my.id
      - LANGFUSE_ENABLED=true
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - luminaprep-net
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads

networks:
  luminaprep-net:
    driver: bridge
