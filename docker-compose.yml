services:
  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: luminaprep-fe
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_URL=http://api:8000 # Points to the api service
    # depends_on:
    #   - api
    restart: unless-stopped
    networks:
      - luminaprep-net

  # api:
