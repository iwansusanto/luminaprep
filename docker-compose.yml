  db:
    image: mysql:8.4
    container_name: luminaprep-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: weGFDaWcfNa/a9c3qftpkbzxiiyJ9UM+
      MYSQL_DATABASE: db_lp
      MYSQL_USER: user_lp
      MYSQL_PASSWORD: Z1KkO7XJXVX9ZZCC1DaiRCsJYuxMlRkR
    ports:
      - "3363:3306"
    volumes:
      - ./dbdata:/var/lib/mysql
    networks:
      - luminaprep-net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: luminaprep-phpmyadmin
    restart: always
    ports:
      - "8099:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
    networks:
      - luminaprep-net

networks:
  luminaprep-net:
    driver: bridge
