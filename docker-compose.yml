services:
  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
      args:
        - VITE_GOOGLE_CLIENT_ID=${VITE_GOOGLE_CLIENT_ID}
    container_name: luminaprep-fe
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_URL=${API_URL}
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - luminaprep-net

  redis:
    image: redis:7-alpine
    container_name: luminaprep-redis
    restart: always
    networks:
      - luminaprep-net
    # No port exposed externally — only accessible within the network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luminaprep-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - luminaprep-net
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: luminaprep-celery-worker
    command: uv run celery -A app.celery_app worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - luminaprep-net
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/uploads:/app/uploads

networks:
  luminaprep-net:
    driver: bridge
