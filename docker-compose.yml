version: '3.8'

services:
  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile
    container_name: luminaprep-fe
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - API_URL=http://api:8000 # Points to the api service
    # depends_on:
    #   - api
    restart: unless-stopped

